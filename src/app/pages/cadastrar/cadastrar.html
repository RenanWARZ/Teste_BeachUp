<div class="register-page">
  <div class="register-layout">
    <section class="hero-section">
      <img src="assets/fundo/fundo-card.jpeg" class="hero-image" />
      <div class="diagonal-divider"></div>
    </section>

    <section class="form-section">
      <div class="form-wrapper">

        <div class="brand">
          <span class="brand-white">Beach</span><span class="brand-orange">Up</span>
        </div>

        <h1>Criar conta</h1>

        <form>

          <input type="text" formControlName="fullName" placeholder="Nome completo">

          <input type="email" formControlName="email" placeholder="Email">

          <input type="password" formControlName="password" placeholder="Senha">

          <input type="password" formControlName="confirmPassword" placeholder="Confirmar senha">

          <select>
            <option value="">Cidade</option>
          </select>

          <button type="submit" class="btn-primary">Criar conta</button>

          <div class="divider">ou</div>

          <button type="button" class="btn-google">
            Entrar com Google
          </button>

          <p class="login-text">
            Já tem conta? <a>Entrar</a>
          </p>

        </form>

      </div>
    </section>
  </div>
</div>

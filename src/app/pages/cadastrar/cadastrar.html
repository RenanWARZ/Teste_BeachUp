<div class="logo">
  <img src="/logo/logo.png" alt="Logo" id="logo" />
  BeachUp
</div>

<div class="card">
  <h1>Crie sua conta</h1>

  <div class="input-group">
    <i class="bi bi-person"></i>
    <input type="text" placeholder="Nome completo" />
  </div>

  <div class="input-group">
    <i class="bi bi-envelope"></i>
    <input type="email" placeholder="E-mail" />
  </div>

  <div class="input-group">
    <i class="bi bi-telephone"></i>
    <input type="text" placeholder="Telefone" />
  </div>

  <div class="input-group">
    <i class="bi bi-lock"></i>
    <input type="password" placeholder="Senha" />
  </div>

  <div class="checkbox">
    <input type="checkbox" id="terms" />
    <label for="terms" class="terms">Concordo com os <a href="#">termos de uso</a></label>
  </div>

  <button class="btn">Criar minha conta</button>
  <button class="btn btn-secondary">Avançar dono de quadra</button>

  <div class="footer">Já tem conta? <a href="#">Entrar</a></div>
</div>
